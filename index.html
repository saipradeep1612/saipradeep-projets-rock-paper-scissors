<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>

  <style>
    /* ============================================
       RESET - Remove default browser styles
    ============================================ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ============================================
       BODY - Main page background and layout
    ============================================ */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ============================================
       TITLE - Game heading at the top
    ============================================ */
    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 6px;
      text-align: center;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 30px;
      text-align: center;
    }

    /* ============================================
       SCOREBOARD - Shows You / Draw / CPU scores
    ============================================ */
    .scoreboard {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
    }

    .score-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px 32px;
      text-align: center;
      min-width: 100px;
    }

    .score-card .label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .score-card .number {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
    }

    /* Each player's score color */
    .score-card.you  .number { color: #60a5fa; } /* Blue  = You  */
    .score-card.draw .number { color: #94a3b8; } /* Gray  = Draw */
    .score-card.cpu  .number { color: #f87171; } /* Red   = CPU  */

    /* ============================================
       BATTLE AREA - Shows both players' choices
    ============================================ */
    .battle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-bottom: 24px;
    }

    .fighter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .fighter-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #64748b;
    }

    /* The circle that shows the chosen emoji */
    .choice-display {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #1e293b;
      border: 2px solid #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      transition: all 0.35s ease;
    }

    /* Color the circle based on game result */
    .choice-display.you-won   { border-color: #60a5fa; box-shadow: 0 0 24px rgba(96, 165, 250, 0.35); }
    .choice-display.cpu-won   { border-color: #f87171; box-shadow: 0 0 24px rgba(248, 113, 113, 0.35); }
    .choice-display.draw-game { border-color: #94a3b8; }

    /* VS badge between the two fighters */
    .vs-badge {
      background: #1e293b;
      border: 1px solid #334155;
      color: #64748b;
      font-size: 0.8rem;
      font-weight: 800;
      padding: 8px 14px;
      border-radius: 20px;
      letter-spacing: 2px;
    }

    /* ============================================
       RESULT MESSAGE - Win / Lose / Draw text
    ============================================ */
    .result-msg {
      font-size: 1.3rem;
      font-weight: 700;
      height: 36px;
      margin-bottom: 24px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .result-msg.win  { color: #60a5fa; } /* Blue  = You won  */
    .result-msg.lose { color: #f87171; } /* Red   = You lost */
    .result-msg.draw { color: #94a3b8; } /* Gray  = Draw     */

    /* ============================================
       CHOICE BUTTONS - Rock / Paper / Scissors
    ============================================ */
    .choices {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
    }

    .choice-btn {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      border: 2px solid #334155;
      background: #1e293b;
      font-size: 2.4rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      color: #f1f5f9;
    }

    /* Hover effect - lifts and glows blue */
    .choice-btn:hover {
      border-color: #60a5fa;
      background: #1e3a5f;
      transform: translateY(-5px) scale(1.06);
      box-shadow: 0 10px 24px rgba(96, 165, 250, 0.25);
    }

    /* Click effect - shrinks slightly */
    .choice-btn:active {
      transform: scale(0.93);
    }

    /* Label text below each button emoji */
    .choice-btn .btn-label {
      position: absolute;
      bottom: -24px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ============================================
       BUTTONS ROW - Reset and Rules buttons
    ============================================ */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 14px;
    }

    .reset-btn, .rules-btn {
      padding: 10px 26px;
      border-radius: 30px;
      border: 1px solid #334155;
      background: transparent;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    .reset-btn {
      color: #94a3b8;
    }
    .reset-btn:hover {
      border-color: #f87171;
      color: #f87171;
      background: rgba(248, 113, 113, 0.08);
    }

    .rules-btn {
      color: #60a5fa;
      border-color: #60a5fa;
    }
    .rules-btn:hover {
      background: rgba(96, 165, 250, 0.1);
    }

    /* ============================================
       RULES BOX - Hidden by default, toggled
    ============================================ */
    .rules-box {
      display: none; /* Hidden until user clicks Rules */
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 18px 24px;
      margin-top: 20px;
      max-width: 320px;
      width: 100%;
      text-align: left;
    }

    .rules-box.active {
      display: block; /* Show when active class is added */
    }

    .rules-box h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #60a5fa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .rules-box ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rules-box li {
      font-size: 0.9rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rules-box li span.icon {
      font-size: 1.1rem;
      min-width: 24px;
    }

    /* ============================================
       HISTORY STRIP - Last 20 results as dots
    ============================================ */
    .history-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #475569;
      margin-top: 24px;
      margin-bottom: 8px;
      text-align: center;
    }

    .history {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 340px;
      min-height: 30px;
    }

    /* Each small dot = one round result */
    .history-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-size: 0.65rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .history-dot.W { background: rgba(96, 165, 250, 0.18);  color: #60a5fa; } /* Win  */
    .history-dot.L { background: rgba(248, 113, 113, 0.18); color: #f87171; } /* Lose */
    .history-dot.D { background: rgba(148, 163, 184, 0.18); color: #94a3b8; } /* Draw */

    /* ============================================
       ANIMATIONS
    ============================================ */

    /* Shake animation for losing */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px) rotate(-4deg); }
      40%       { transform: translateX(8px)  rotate(4deg);  }
      60%       { transform: translateX(-6px) rotate(-3deg); }
      80%       { transform: translateX(6px)  rotate(3deg);  }
    }
    .shake { animation: shake 0.5s ease; }

    /* Bounce animation for winning score */
    @keyframes bounce {
      0%, 100% { transform: scale(1);    }
      40%       { transform: scale(1.2); }
      70%       { transform: scale(0.9); }
    }
    .bounce { animation: bounce 0.45s ease; }

    /* Pop animation for choice display */
    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0;   }
      70%  { transform: scale(1.1);               }
      100% { transform: scale(1);   opacity: 1;   }
    }
    .pop { animation: pop 0.35s ease; }

    /* ============================================
       RESPONSIVE - Mobile screen adjustments
    ============================================ */
    @media (max-width: 480px) {
      h1 { font-size: 1.7rem; }

      .scoreboard { gap: 10px; }
      .score-card { padding: 12px 18px; min-width: 80px; }
      .score-card .number { font-size: 1.8rem; }

      .choice-display { width: 95px; height: 95px; font-size: 2.5rem; }

      .choice-btn { width: 78px; height: 78px; font-size: 2rem; }
      .choices { gap: 14px; }

      .battle { gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- ========== TITLE ========== -->
  <h1>Rock Paper Scissors</h1>
  <p class="subtitle">Choose your weapon and beat the CPU!</p>

  <!-- ========== SCOREBOARD ========== -->
  <div class="scoreboard">
    <div class="score-card you">
      <div class="label">You</div>
      <div class="number" id="scoreYou">0</div>
    </div>
    <div class="score-card draw">
      <div class="label">Draw</div>
      <div class="number" id="scoreDraw">0</div>
    </div>
    <div class="score-card cpu">
      <div class="label">CPU</div>
      <div class="number" id="scoreCpu">0</div>
    </div>
  </div>

  <!-- ========== BATTLE AREA ========== -->
  <div class="battle">

    <!-- Your choice display -->
    <div class="fighter">
      <div class="fighter-label">You</div>
      <div class="choice-display" id="displayYou">❓</div>
    </div>

    <!-- VS badge in the middle -->
    <div class="vs-badge">VS</div>

    <!-- CPU's choice display -->
    <div class="fighter">
      <div class="fighter-label">CPU</div>
      <div class="choice-display" id="displayCpu">❓</div>
    </div>

  </div>

  <!-- ========== RESULT MESSAGE ========== -->
  <div class="result-msg" id="resultMsg">Choose your weapon!</div>

  <!-- ========== CHOICE BUTTONS ========== -->
  <div class="choices">

    <!-- Rock button -->
    <button class="choice-btn" onclick="play('rock')" title="Rock">
      🪨
      <span class="btn-label">Rock</span>
    </button>

    <!-- Paper button -->
    <button class="choice-btn" onclick="play('paper')" title="Paper">
      📄
      <span class="btn-label">Paper</span>
    </button>

    <!-- Scissors button -->
    <button class="choice-btn" onclick="play('scissors')" title="Scissors">
      ✂️
      <span class="btn-label">Scissors</span>
    </button>

  </div>

  <!-- ========== ACTION BUTTONS ========== -->
  <div class="btn-row">
    <button class="reset-btn" onclick="resetGame()">↺ Reset</button>
    <button class="rules-btn" onclick="toggleRules()">📖 Rules</button>
  </div>

  <!-- ========== RULES BOX (hidden by default) ========== -->
  <div class="rules-box" id="rulesBox">
    <h3>How to Play</h3>
    <ul>
      <li><span class="icon">🪨</span> Rock beats Scissors</li>
      <li><span class="icon">📄</span> Paper beats Rock</li>
      <li><span class="icon">✂️</span> Scissors beats Paper</li>
      <li><span class="icon">🤝</span> Same choice = Draw</li>
    </ul>
  </div>

  <!-- ========== HISTORY STRIP ========== -->
  <div class="history-title">Round History</div>
  <div class="history" id="history"></div>


  <!-- ============================================
       JAVASCRIPT - All game logic is here
  ============================================ -->
  <script>

    /* ------------------------------------------
       STEP 1: Set up game data
    ------------------------------------------ */

    // Emoji for each choice - used to display on screen
    const emoji = {
      rock:     '🪨',
      paper:    '📄',
      scissors: '✂️'
    };

    // What beats what - key beats its value
    // Rock beats Scissors
    // Paper beats Rock
    // Scissors beats Paper
    const beats = {
      rock:     'scissors',
      paper:    'rock',
      scissors: 'paper'
    };

    // All 3 choices the CPU can pick from
    const allChoices = ['rock', 'paper', 'scissors'];

    // Score tracker object - starts at 0
    const score = {
      you:  0,
      cpu:  0,
      draw: 0
    };

    // Array to store every round result: 'W', 'L', or 'D'
    const history = [];


    /* ------------------------------------------
       STEP 2: CPU randomly picks a choice
    ------------------------------------------ */
    function cpuPick() {
      // Math.random() gives a number from 0 to 0.999...
      // Multiply by 3 gives 0 to 2.999...
      // Math.floor rounds DOWN to 0, 1, or 2
      // Use that as index to pick from allChoices array
      const randomIndex = Math.floor(Math.random() * allChoices.length);
      return allChoices[randomIndex];
    }


    /* ------------------------------------------
       STEP 3: Decide who won the round
    ------------------------------------------ */
    function getResult(userChoice, cpuChoice) {
      // If both same → draw
      if (userChoice === cpuChoice) {
        return 'draw';
      }

      // If what the user picked beats the CPU's pick → win
      if (beats[userChoice] === cpuChoice) {
        return 'win';
      }

      // Otherwise → lose
      return 'lose';
    }


    /* ------------------------------------------
       STEP 4: Helper - restart an animation
       We remove the class, force the browser
       to notice (offsetWidth), then add it back
    ------------------------------------------ */
    function triggerAnimation(element, animClass) {
      element.classList.remove(animClass);
      void element.offsetWidth;  // Forces browser reflow
      element.classList.add(animClass);
    }


    /* ------------------------------------------
       STEP 5: Main play function
       Called when user clicks Rock, Paper, or Scissors
    ------------------------------------------ */
    function play(userChoice) {

      // CPU picks randomly
      const cpuChoice = cpuPick();

      // Figure out result
      const result = getResult(userChoice, cpuChoice);

      // Get references to HTML elements we need to update
      const dispYou = document.getElementById('displayYou');
      const dispCpu = document.getElementById('displayCpu');
      const msgEl   = document.getElementById('resultMsg');

      // --- Update emoji displays ---
      dispYou.textContent = emoji[userChoice];
      dispCpu.textContent = emoji[cpuChoice];

      // --- Reset all classes first ---
      dispYou.className = 'choice-display';
      dispCpu.className = 'choice-display';
      msgEl.className   = 'result-msg';

      // --- Animate the displays popping in ---
      triggerAnimation(dispYou, 'pop');
      triggerAnimation(dispCpu, 'pop');

      // --- Handle each result case ---

      if (result === 'win') {
        // YOU WIN
        score.you++;
        dispYou.classList.add('you-won');       // Blue glow on your display
        msgEl.classList.add('win');
        msgEl.textContent = '🎉 You Win This Round!';
        history.push('W');                       // Add 'W' to history

        // Bounce the score number
        const numEl = document.getElementById('scoreYou');
        triggerAnimation(numEl, 'bounce');

      } else if (result === 'lose') {
        // YOU LOSE
        score.cpu++;
        dispCpu.classList.add('cpu-won');       // Red glow on CPU display
        dispYou.classList.add('shake');          // Shake YOUR display
        msgEl.classList.add('lose');
        msgEl.textContent = '💀 CPU Wins This Round!';
        history.push('L');                       // Add 'L' to history

        // Bounce the CPU score number
        const numEl = document.getElementById('scoreCpu');
        triggerAnimation(numEl, 'bounce');

      } else {
        // DRAW
        score.draw++;
        dispYou.classList.add('draw-game');     // Gray border on both
        dispCpu.classList.add('draw-game');
        msgEl.classList.add('draw');
        msgEl.textContent = "🤝 It's a Draw!";
        history.push('D');                       // Add 'D' to history

        // Bounce the draw score number
        const numEl = document.getElementById('scoreDraw');
        triggerAnimation(numEl, 'bounce');
      }

      // --- Update scoreboard numbers on screen ---
      document.getElementById('scoreYou').textContent  = score.you;
      document.getElementById('scoreCpu').textContent  = score.cpu;
      document.getElementById('scoreDraw').textContent = score.draw;

      // --- Re-render the history strip ---
      renderHistory();
    }


    /* ------------------------------------------
       STEP 6: Render the history dot strip
       Shows last 20 rounds as colored dots
    ------------------------------------------ */
    function renderHistory() {
      const container = document.getElementById('history');

      // Clear existing dots
      container.innerHTML = '';

      // Only show the last 20 results
      const recent = history.slice(-20);

      // Create a dot element for each result
      recent.forEach(function(result) {
        const dot = document.createElement('div');

        // Add classes: 'history-dot' + 'W' or 'L' or 'D'
        dot.className = 'history-dot ' + result;

        // Show the letter inside the dot
        dot.textContent = result;

        // Add tooltip on hover
        dot.title = result === 'W' ? 'You Won'
                  : result === 'L' ? 'CPU Won'
                  : 'Draw';

        container.appendChild(dot);
      });
    }


    /* ------------------------------------------
       STEP 7: Reset everything back to zero
    ------------------------------------------ */
    function resetGame() {

      // Reset score object
      score.you  = 0;
      score.cpu  = 0;
      score.draw = 0;

      // Clear the history array
      history.length = 0;

      // Reset score numbers on screen
      document.getElementById('scoreYou').textContent  = '0';
      document.getElementById('scoreCpu').textContent  = '0';
      document.getElementById('scoreDraw').textContent = '0';

      // Reset choice displays back to question marks
      const dispYou = document.getElementById('displayYou');
      const dispCpu = document.getElementById('displayCpu');
      dispYou.textContent = '❓';
      dispCpu.textContent = '❓';
      dispYou.className = 'choice-display';
      dispCpu.className = 'choice-display';

      // Reset result message
      const msgEl = document.getElementById('resultMsg');
      msgEl.className   = 'result-msg';
      msgEl.textContent = 'Choose your weapon!';

      // Clear history dots
      renderHistory();

      // Hide rules box if open
      document.getElementById('rulesBox').classList.remove('active');
    }


    /* ------------------------------------------
       STEP 8: Toggle rules box show / hide
    ------------------------------------------ */
    function toggleRules() {
      const rulesBox = document.getElementById('rulesBox');

      // If it has 'active' class remove it, otherwise add it
      rulesBox.classList.toggle('active');
    }

  </script>

</body>
</html>
